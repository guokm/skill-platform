services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: skill-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillplatform
      POSTGRES_USER: skilluser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skillpass2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skilluser -d skillplatform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skill-net

  # ── Spring Boot Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skill-platform-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: skillplatform
      DB_USER: skilluser
      DB_PASSWORD: ${DB_PASSWORD:-skillpass2026}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-SkillAtlas-Super-Secret-Key-2026-Change-This-In-Production!}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-72}
      # Linux.do OAuth2
      LINUX_DO_CLIENT_ID: ${LINUX_DO_CLIENT_ID:-7C2cUmHTgMEb028o0S1ia1bocG7chm7V}
      LINUX_DO_CLIENT_SECRET: ${LINUX_DO_CLIENT_SECRET:-wU5UFgt9YPnw4IaHtorNcBS48aiOhdCJ}
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI:-http://ai.5420486.xyz/api/auth/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://ai.5420486.xyz}
      # Admin
      ADMIN_USERNAME: ${ADMIN_USERNAME:-skillatlas}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Sk!llAtl@s#2026$}
      ADMIN_MIN_TRUST_LEVEL: ${ADMIN_MIN_TRUST_LEVEL:-2}
      ADMIN_EXTRA_IDS: ${ADMIN_EXTRA_IDS:-}
      # Crawler
      SKILL_SCAN_PATH: "/skills"
      SKILL_SCAN_PATHS: "${SKILL_SCAN_PATHS:-}"
      SKILL_UPLOAD_PATH: "${SKILL_UPLOAD_PATH:-/skills/user-submissions}"
      SKILL_UPLOAD_AUTO_CRAWL: "${SKILL_UPLOAD_AUTO_CRAWL:-true}"
      DEFAULT_USER_POINTS: "${DEFAULT_USER_POINTS:-100}"
      DAILY_CHECK_IN_POINTS: "${DAILY_CHECK_IN_POINTS:-5}"
      SKILL_SUBMISSION_POINTS: "${SKILL_SUBMISSION_POINTS:-200}"
      AUTHOR_SHARE_RATIO: "${AUTHOR_SHARE_RATIO:-0.7}"
      STREAK_7DAY_BONUS: "${STREAK_7DAY_BONUS:-30}"
      STREAK_30DAY_BONUS: "${STREAK_30DAY_BONUS:-200}"
      RATING_REWARD: "${RATING_REWARD:-2}"
      SKILL_CRAWL_ON_STARTUP: "${SKILL_CRAWL_ON_STARTUP:-true}"
      SKILL_CRAWLER_CRON: "${SKILL_CRAWLER_CRON:-0 0 */6 * * *}"
      DEMO_DATA_ENABLED: "${DEMO_DATA_ENABLED:-false}"
      MARKETPLACE_URL: "${MARKETPLACE_URL:-}"
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      # Mount your local skills directory here
      - ${SKILLS_DIR:-./skills-data}:/skills
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/skills/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - skill-net

  # ── React Frontend (Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skill-platform-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PORT:-80}:80"
    networks:
      - skill-net

volumes:
  postgres_data:
    name: skill-platform-pgdata

networks:
  skill-net:
    name: skill-platform-network
    driver: bridge
