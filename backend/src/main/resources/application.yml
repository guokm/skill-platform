server:
  port: 8080

spring:
  application:
    name: skill-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skillplatform}
    username: ${DB_USER:skilluser}
    password: ${DB_PASSWORD:skillpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  cache:
    type: caffeine

  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:100MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:120MB}

# Skills crawler config
skill:
  crawler:
    scan-path: ${SKILL_SCAN_PATH:/skills}
    scan-paths: ${SKILL_SCAN_PATHS:}
    run-on-startup: ${SKILL_CRAWL_ON_STARTUP:true}
    cron: ${SKILL_CRAWLER_CRON:0 0 */6 * * *}
    marketplace-url: ${MARKETPLACE_URL:}
  upload:
    base-path: ${SKILL_UPLOAD_PATH:/skills/user-submissions}
    auto-crawl: ${SKILL_UPLOAD_AUTO_CRAWL:true}

app:
  demo-data:
    enabled: ${DEMO_DATA_ENABLED:false}

  # JWT
  jwt:
    secret: ${JWT_SECRET:SkillAtlas-Super-Secret-Key-2026-Change-In-Production-Must-Be-32chars}
    expiration-hours: ${JWT_EXPIRATION_HOURS:168}   # 7 days

  # Linux.do OAuth2
  oauth2:
    linux-do:
      client-id: ${LINUX_DO_CLIENT_ID:7C2cUmHTgMEb028o0S1ia1bocG7chm7V}
      client-secret: ${LINUX_DO_CLIENT_SECRET:wU5UFgt9YPnw4IaHtorNcBS48aiOhdCJ}
      authorization-endpoint: https://connect.linux.do/oauth2/authorize
      token-endpoint: https://connect.linux.do/oauth2/token
      user-endpoint: https://connect.linux.do/api/user
      redirect-uri: ${OAUTH2_REDIRECT_URI:http://ai.5420486.xyz/api/auth/callback}
      frontend-url: ${FRONTEND_URL:http://ai.5420486.xyz}

  # Admin config
  admin:
    min-trust-level: ${ADMIN_MIN_TRUST_LEVEL:2}
    extra-admin-ids: ${ADMIN_EXTRA_IDS:}    # comma-separated linux.do user IDs
    # 固定后台账密（用于直接登录管理页，无需 Linux.do）
    username: ${ADMIN_USERNAME:skillatlas}
    password: ${ADMIN_PASSWORD:Sk!llAtl@s#2026$}

  points:
    initial-balance: ${DEFAULT_USER_POINTS:100}
    daily-check-in-reward: ${DAILY_CHECK_IN_POINTS:5}
    skill-submission-reward: ${SKILL_SUBMISSION_POINTS:200}
    upload-unlock-rank: ${UPLOAD_UNLOCK_RANK:3}
    author-share-ratio: ${AUTHOR_SHARE_RATIO:0.7}
    streak-7day-bonus: ${STREAK_7DAY_BONUS:30}
    streak-30day-bonus: ${STREAK_30DAY_BONUS:200}
    rating-reward: ${RATING_REWARD:2}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.skillplatform: INFO
    org.springframework.web: WARN
